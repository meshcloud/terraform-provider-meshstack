version: '3'

dotenv: ['.env']

tasks:
  testacc:
    desc: Run acceptance tests
    env:
      TF_ACC: 1
    cmds:
      # gotestsum consumes `go test -json` and prints each test result as it completes, so output isn't
      # buffered per-package. Plain `go test ./... -v` withholds a package's output until its test binary
      # exits — and since every acceptance test lives in ./internal/provider, that means ~5 minutes of no
      # output (looks hung in CI). gotestsum streams it live instead.
      # -count=1 disables Go's test result cache — acceptance tests test a live service (e.g. meshfed-api), whose changes are invisible to Go's source-based cache
      - go tool gotestsum --format standard-verbose -- ./... -count=1 {{.CLI_ARGS}} -timeout 120m

  test:
    desc: Run unit tests only
    cmds:
      - go test ./... -v {{.CLI_ARGS}} -short

  build:
    desc: Build the provider
    cmds:
      - go build {{.CLI_ARGS}} -o terraform-provider-meshstack

  install:
    desc: Install provider locally for testing
    cmds:
      - go install {{.CLI_ARGS}}

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run {{.CLI_ARGS}}

  generate:
    desc: Generate documentation
    cmds:
      - go generate {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f terraform-provider-meshstack
      - rm -rf .terraform
      - rm -f .terraform.lock.hcl
